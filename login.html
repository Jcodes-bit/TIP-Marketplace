<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TIP Marketplace</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #0c0c0c; --card: #141414; --border: #222;
      --yellow: #F5C400; --yellow-glow: rgba(245,196,0,0.2);
      --white: #efefef; --muted: #666;
    }
    html, body {
      height: 100%; background: var(--black);
      color: var(--white); font-family: 'DM Sans', sans-serif;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    .grid {
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(245,196,0,0.15) 1px, transparent 1px),
        linear-gradient(90deg, rgba(245,196,0,0.15) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
      -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
      animation: gridPulse 4s ease-in-out infinite;
    }
    @keyframes gridPulse { 0%,100%{opacity:.6} 50%{opacity:1} }
    .glow {
      position: fixed; z-index: 0; width: 500px; height: 500px; border-radius: 50%;
      background: radial-gradient(circle, rgba(245,196,0,0.1) 0%, transparent 70%);
      top: 50%; left: 50%; transform: translate(-50%,-50%); pointer-events: none;
      animation: glowPulse 4s ease-in-out infinite;
    }
    @keyframes glowPulse {
      0%,100%{transform:translate(-50%,-50%) scale(1);opacity:.8}
      50%{transform:translate(-50%,-50%) scale(1.15);opacity:1}
    }
    .wrap {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      width: 100%; max-width: 480px; padding: 24px;
      animation: rise 0.6s cubic-bezier(.22,1,.36,1) both;
    }
    @keyframes rise { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
    .logo { display: flex; align-items: center; gap: 14px; margin-bottom: 52px; }
    .logo-mark {
      width: 52px; height: 52px; border-radius: 12px; background: var(--yellow);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: #000;
      box-shadow: 0 0 24px rgba(245,196,0,0.5);
    }
    .logo-name { font-family: 'Bebas Neue', sans-serif; font-size: 32px; letter-spacing: 2px; color: var(--white); }
    .logo-name span { color: var(--yellow); }
    .card {
      width: 100%; background: rgba(20,20,20,0.85); backdrop-filter: blur(12px);
      border: 1px solid rgba(245,196,0,0.15); border-radius: 24px;
      padding: 52px 48px; box-shadow: 0 0 40px rgba(245,196,0,0.05);
    }
    .title { font-family: 'Bebas Neue', sans-serif; font-size: 52px; letter-spacing: 1px; color: var(--white); margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: var(--muted); margin-bottom: 36px; line-height: 1.5; font-weight: 300; }
    .btn-login {
      width: 100%; padding: 18px 24px;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      background: var(--yellow); border: none; border-radius: 14px;
      font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1.5px;
      color: #000; cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .btn-login:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(245,196,0,0.5); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
    .switch-account {
      margin-top: 20px; display: inline-block; font-size: 13px;
      color: var(--muted); cursor: pointer; transition: color 0.2s;
      text-align: center; width: 100%;
    }
    .switch-account:hover { color: var(--yellow); }
    .spinner {
      width: 20px; height: 20px;
      border: 3px solid rgba(0,0,0,0.2); border-top-color: #000;
      border-radius: 50%; animation: spin 0.6s linear infinite; display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .alert { display: none; margin-top: 18px; border-radius: 12px; padding: 14px 16px; font-size: 14px; line-height: 1.5; }
    .alert.error { background: rgba(255,80,80,0.08); border: 1px solid rgba(255,80,80,0.2); color: #ff6060; }
    .alert.show { display: block; }
    @media (max-width: 520px) { .card { padding: 36px 28px; } .wrap { max-width: 100%; } }
  </style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow"></div>
  <div class="wrap">
    <div class="logo">
      <div class="logo-mark">TIP</div>
      <div class="logo-name">TIP <span>Marketplace</span></div>
    </div>
    <div class="card">
      <div class="title">Sign In</div>
      <p class="subtitle">Welcome back! Sign in with your school Google account to continue.</p>
      <button class="btn-login" id="loginBtn" onclick="handleGoogleLogin()">
        <div class="spinner" id="spinner"></div>
        <span id="btnText">Login</span>
      </button>
      <div class="switch-account" onclick="handleGoogleLogin(true)">Use a different account</div>
      <div class="alert error" id="errorBox"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc, serverTimestamp }
      from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDtWOAUuHIGeAGScFF0MNZlTTfL6o-vvqY",
      authDomain: "tip-marketplace.firebaseapp.com",
      projectId: "tip-marketplace",
      storageBucket: "tip-marketplace.firebasestorage.app",
      messagingSenderId: "327363102547",
      appId: "1:327363102547:web:101bbed6022f328f80c3a6"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    const btn = document.getElementById('loginBtn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');
    const errorBox = document.getElementById('errorBox');

    function setLoading(on) {
      btn.disabled = on;
      spinner.style.display = on ? 'block' : 'none';
      btnText.textContent = on ? 'Please wait…' : 'Login';
    }
    function showError(msg) {
      errorBox.textContent = '⚠️ ' + msg;
      errorBox.classList.add('show');
    }

    onAuthStateChanged(auth, user => {
      if (user) window.location.href = 'index.html';
    });

    window.handleGoogleLogin = async (forceSelect = false) => {
      provider.setCustomParameters({ prompt: forceSelect ? 'select_account' : '' });
      setLoading(true);
      errorBox.classList.remove('show');
      try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;
        const userRef = doc(db, 'users', user.uid);
        const userSnap = await getDoc(userRef);
        if (!userSnap.exists()) {
          await setDoc(userRef, {
            uid: user.uid, name: user.displayName,
            email: user.email, photo: user.photoURL,
            createdAt: serverTimestamp()
          });
        }
        window.location.href = 'index.html';
      } catch (err) {
        setLoading(false);
        if (err.code === 'auth/popup-closed-by-user') showError('Login was cancelled.');
        else { showError('Something went wrong. Please try again.'); console.error(err); }
      }
    };
  </script>
</body>
</html>
