<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Messages — TIP Marketplace</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%23F5C400'/><text y='72' x='50' text-anchor='middle' font-size='58' font-family='Arial Black,sans-serif' font-weight='900' fill='%23000'>TIP</text></svg>" />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --yellow: #F5C400;
    --yellow-glow: rgba(245,196,0,0.25);
    --bg: #0c0c0c;
    --card: #141414;
    --card2: #1a1a1a;
    --border2: #222;
    --text: #efefef;
    --muted: #666;
    --grid: rgba(245,196,0,0.06);
    --red: #ff4d4d;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; visibility: hidden; }
  body.ready { visibility: visible; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: linear-gradient(var(--grid) 1px, transparent 1px), linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 40px 40px; pointer-events: none; z-index: 0;
  }

  /* NAV */
  nav {
    position: relative; z-index: 10;
    background: rgba(12,12,12,0.95); backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border2);
    display: flex; align-items: center; padding: 0 20px; height: 56px; gap: 12px; flex-shrink: 0;
  }
  .nav-logo { display: flex; align-items: center; gap: 9px; text-decoration: none; flex-shrink: 0; }
  .nav-logo .badge { background: var(--yellow); color: #000; font-family: 'Bebas Neue', sans-serif; font-size: 16px; width: 32px; height: 32px; border-radius: 7px; display: flex; align-items: center; justify-content: center; }
  .nav-logo .wordmark { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 2px; color: var(--text); }
  .nav-logo .wordmark span { color: var(--yellow); }
  .nav-title { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 1px; color: var(--text); flex: 1; }
  .nav-back { display: flex; align-items: center; gap: 6px; background: var(--card2); border: 1px solid var(--border2); border-radius: 8px; padding: 6px 12px; color: var(--text); font-size: 12px; font-weight: 500; text-decoration: none; transition: border-color .2s; flex-shrink: 0; }
  .nav-back:hover { border-color: var(--muted); }

  /* LAYOUT — full height split */
  .msg-layout {
    position: relative; z-index: 1;
    display: flex; height: calc(100vh - 56px);
  }

  /* ── LEFT SIDEBAR ── */
  .sidebar {
    width: 300px; flex-shrink: 0;
    border-right: 1px solid var(--border2);
    display: flex; flex-direction: column;
    background: rgba(12,12,12,0.6);
  }
  .sidebar-header {
    padding: 16px 16px 12px;
    border-bottom: 1px solid var(--border2); flex-shrink: 0;
  }
  .sidebar-heading { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 1px; margin-bottom: 10px; }
  .sidebar-search {
    display: flex; align-items: center; gap: 8px;
    background: var(--card2); border: 1px solid var(--border2);
    border-radius: 20px; padding: 8px 14px; transition: border-color .2s;
  }
  .sidebar-search:focus-within { border-color: rgba(245,196,0,0.35); }
  .sidebar-search svg { flex-shrink: 0; }
  .sidebar-search input { background: none; border: none; outline: none; color: var(--text); font-size: 13px; width: 100%; font-family: 'DM Sans', sans-serif; }

  .thread-list { flex: 1; overflow-y: auto; }
  .thread-item {
    display: flex; align-items: center; gap: 11px;
    padding: 13px 16px; cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    transition: background .15s; position: relative;
  }
  .thread-item:hover { background: rgba(255,255,255,0.03); }
  .thread-item.active { background: rgba(245,196,0,0.06); border-left: 3px solid var(--yellow); padding-left: 13px; }
  .thread-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--yellow); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700; color: #000; overflow: hidden; position: relative;
  }
  .thread-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .thread-online { position: absolute; bottom: 1px; right: 1px; width: 11px; height: 11px; border-radius: 50%; background: #00c864; border: 2px solid var(--bg); }
  .thread-body { flex: 1; overflow: hidden; }
  .thread-top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 3px; }
  .thread-name { font-size: 13px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }
  .thread-time { font-size: 10px; color: var(--muted); flex-shrink: 0; }
  .thread-bottom { display: flex; justify-content: space-between; align-items: center; }
  .thread-preview { font-size: 12px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 180px; }
  .thread-item.unread .thread-name { font-weight: 700; }
  .thread-item.unread .thread-preview { color: var(--text); font-weight: 500; }
  .unread-pill { background: var(--yellow); color: #000; font-size: 10px; font-weight: 700; border-radius: 20px; padding: 1px 6px; min-width: 18px; text-align: center; flex-shrink: 0; }
  .thread-ref { font-size: 10px; color: var(--yellow); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .sidebar-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: var(--muted); padding: 40px 20px; text-align: center; }
  .sidebar-empty .se-icon { font-size: 38px; opacity: 0.35; }
  .sidebar-empty p { font-size: 13px; line-height: 1.5; }

  /* ── RIGHT CHAT PANE ── */
  .chat-area {
    flex: 1; display: flex; flex-direction: column; overflow: hidden;
    background: rgba(10,10,10,0.5);
  }

  /* placeholder when no thread selected */
  .chat-placeholder {
    flex: 1; display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 14px; color: var(--muted);
  }
  .chat-placeholder .cp-icon { font-size: 52px; opacity: 0.25; }
  .chat-placeholder h3 { font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 1px; opacity: 0.4; }
  .chat-placeholder p { font-size: 13px; opacity: 0.4; }

  /* chat header */
  .chat-header {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 20px; border-bottom: 1px solid var(--border2);
    background: rgba(12,12,12,0.7); flex-shrink: 0;
  }
  .ch-avatar { width: 38px; height: 38px; border-radius: 50%; background: var(--yellow); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #000; overflow: hidden; flex-shrink: 0; }
  .ch-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .ch-info { flex: 1; overflow: hidden; }
  .ch-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ch-sub  { font-size: 11px; color: var(--muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .ch-listing-btn {
    display: flex; align-items: center; gap: 6px;
    background: var(--card2); border: 1px solid var(--border2);
    border-radius: 8px; padding: 6px 12px;
    font-size: 12px; color: var(--text); cursor: pointer;
    text-decoration: none; transition: border-color .15s; flex-shrink: 0;
  }
  .ch-listing-btn:hover { border-color: rgba(245,196,0,0.4); }

  /* messages */
  .chat-messages {
    flex: 1; overflow-y: auto; padding: 20px 20px 10px;
    display: flex; flex-direction: column; gap: 4px;
  }

  /* date divider */
  .date-divider {
    display: flex; align-items: center; gap: 10px;
    margin: 14px 0 10px; color: var(--muted); font-size: 11px;
  }
  .date-divider::before, .date-divider::after { content: ''; flex: 1; height: 1px; background: var(--border2); }

  /* message bubble group */
  .msg-group { display: flex; flex-direction: column; margin-bottom: 2px; }
  .msg-group.mine  { align-items: flex-end; }
  .msg-group.theirs{ align-items: flex-start; }

  .msg-row { display: flex; align-items: flex-end; gap: 6px; }
  .msg-group.mine  .msg-row { flex-direction: row-reverse; }

  .msg-avatar-sm {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--yellow); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700; color: #000; overflow: hidden;
    margin-bottom: 2px;
  }
  .msg-avatar-sm img { width: 100%; height: 100%; object-fit: cover; }
  .msg-avatar-placeholder { width: 26px; flex-shrink: 0; }

  .bubble {
    max-width: 420px; padding: 9px 14px;
    border-radius: 18px; font-size: 14px; line-height: 1.5;
    word-break: break-word;
  }
  .msg-group.mine   .bubble { background: var(--yellow); color: #000; border-bottom-right-radius: 5px; }
  .msg-group.theirs .bubble { background: var(--card2); color: var(--text); border-bottom-left-radius: 5px; }

  /* consecutive bubbles — flatten corners */
  .msg-group.mine   .msg-row:not(:last-child) .bubble { border-bottom-right-radius: 5px; border-top-right-radius: 5px; }
  .msg-group.mine   .msg-row:not(:first-child) .bubble { border-top-right-radius: 5px; }
  .msg-group.theirs .msg-row:not(:last-child) .bubble { border-bottom-left-radius: 5px; border-top-left-radius: 5px; }
  .msg-group.theirs .msg-row:not(:first-child) .bubble { border-top-left-radius: 5px; }

  .bubble-time { font-size: 10px; color: var(--muted); margin-top: 3px; padding: 0 4px; }
  .msg-group.mine   .bubble-time { text-align: right; }
  .msg-group.theirs .bubble-time { text-align: left; }

  /* typing indicator */
  .typing-indicator { display: flex; align-items: center; gap: 8px; padding: 6px 0 2px; }
  .typing-dots { display: flex; gap: 4px; align-items: center; background: var(--card2); border-radius: 18px; border-bottom-left-radius: 5px; padding: 10px 14px; }
  .typing-dots span { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); animation: bounce 1.2s infinite; }
  .typing-dots span:nth-child(2) { animation-delay: .2s; }
  .typing-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

  /* input row */
  .chat-input-area {
    border-top: 1px solid var(--border2);
    padding: 12px 16px; background: rgba(12,12,12,0.7);
    display: flex; align-items: flex-end; gap: 10px; flex-shrink: 0;
  }
  .chat-input-wrap { flex: 1; background: var(--card2); border: 1px solid var(--border2); border-radius: 22px; display: flex; align-items: flex-end; padding: 4px 6px 4px 16px; transition: border-color .2s; gap: 6px; }
  .chat-input-wrap:focus-within { border-color: rgba(245,196,0,0.35); }
  .chat-input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px;
    resize: none; max-height: 120px; line-height: 1.5; padding: 7px 0;
    overflow-y: auto;
  }
  .chat-send {
    width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
    background: var(--yellow); border: none; color: #000;
    font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: transform .15s, opacity .15s; align-self: flex-end; margin-bottom: 1px;
  }
  .chat-send:hover:not(:disabled) { transform: scale(1.08); }
  .chat-send:disabled { opacity: 0.4; cursor: default; }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-thumb { background: rgba(245,196,0,0.12); border-radius: 4px; }

  /* MOBILE — show sidebar by default, hide chat */
  @media (max-width: 640px) {
    .sidebar { width: 100%; border-right: none; }
    .chat-area { display: none; position: fixed; inset: 56px 0 0; z-index: 50; background: var(--bg); }
    .chat-area.mobile-open { display: flex; }
    .ch-back { display: flex !important; }
  }
  .ch-back {
    display: none; background: none; border: none; color: var(--text);
    font-size: 20px; cursor: pointer; padding: 4px; margin-right: 4px;
  }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">
    <div class="badge">TIP</div>
    <span class="wordmark">TIP <span>MARKETPLACE</span></span>
  </a>
  <div class="nav-title">Messages</div>
  <a class="nav-back" href="index.html">← Marketplace</a>
</nav>

<div class="msg-layout">

  <!-- SIDEBAR -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-heading">Inbox</div>
      <div class="sidebar-search">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
          <circle cx="6.5" cy="6.5" r="5" stroke="#666" stroke-width="1.5"/>
          <path d="M10.5 10.5L14 14" stroke="#666" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input type="text" id="threadSearch" placeholder="Search conversations…" autocomplete="off" />
      </div>
    </div>
    <div class="thread-list" id="threadList"></div>
  </div>

  <!-- CHAT AREA -->
  <div class="chat-area" id="chatArea">
    <div class="chat-placeholder" id="chatPlaceholder">
      <div class="cp-icon">💬</div>
      <h3>Your Messages</h3>
      <p>Select a conversation to start chatting</p>
    </div>
  </div>

</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
  import {
    getFirestore, collection, doc, addDoc, setDoc, getDoc,
    onSnapshot, query, orderBy, where, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDtWOAUuHIGeAGScFF0MNZlTTfL6o-vvqY",
    authDomain: "tip-marketplace.firebaseapp.com",
    projectId: "tip-marketplace",
    storageBucket: "tip-marketplace.firebasestorage.app",
    messagingSenderId: "327363102547",
    appId: "1:327363102547:web:101bbed6022f328f80c3a6"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  let me           = null;   // current user
  let allThreads   = [];
  let filteredThreads = [];
  let activeThread = null;
  let chatUnsub    = null;
  let threadsUnsub = null;
  let searchVal    = '';
  // cache: uid -> { name, photo } — always use latest profile photo
  const profileCache = {};
  const profileUnsubs = {};  // live listeners per uid

  // ── HELPERS ──
  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function timeAgo(ts) {
    if (!ts) return '';
    const d   = ts.toDate ? ts.toDate() : new Date(ts);
    const now = Date.now();
    const diff = (now - d) / 1000;
    if (diff < 55)    return 'now';
    if (diff < 3600)  return `${Math.floor(diff / 60)}m`;
    if (diff < 86400) return `${Math.floor(diff / 3600)}h`;
    const days = Math.floor(diff / 86400);
    if (days < 7)     return `${days}d`;
    return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
  }

  function fmtTime(ts) {
    if (!ts) return '';
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function fmtDate(ts) {
    if (!ts) return '';
    const d    = ts.toDate ? ts.toDate() : new Date(ts);
    const now  = new Date();
    const diff = (now - d) / 86400000;
    if (diff < 1 && now.getDate() === d.getDate()) return 'Today';
    if (diff < 2) return 'Yesterday';
    return d.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
  }

  function avatarHtml(photo, name, size = 44) {
    const init = (name || 'U')[0].toUpperCase();
    if (photo) return `<img src="${esc(photo)}" alt="${esc(name)}" />`;
    return `<span style="font-size:${Math.round(size*0.36)}px">${init}</span>`;
  }

  // Get best available photo for a uid (profile cache > conversation stored photo)
  function bestPhoto(uid, fallbackPhoto) {
    return profileCache[uid]?.photo || fallbackPhoto || null;
  }
  function bestName(uid, fallbackName) {
    return profileCache[uid]?.name || fallbackName || 'Unknown';
  }

  // Subscribe to a user's profile doc so photo updates are live
  function subscribeProfile(uid, fallbackName, fallbackPhoto) {
    if (profileUnsubs[uid]) return; // already subscribed
    // seed cache immediately with what we know
    if (!profileCache[uid]) profileCache[uid] = { name: fallbackName, photo: fallbackPhoto };
    const unsub = onSnapshot(doc(db, 'profiles', uid), snap => {
      if (snap.exists()) {
        const d = snap.data();
        profileCache[uid] = {
          name:  d.displayName || fallbackName || 'Unknown',
          photo: d.photoBase64 || fallbackPhoto || null
        };
      } else {
        profileCache[uid] = { name: fallbackName || 'Unknown', photo: fallbackPhoto || null };
      }
      // re-render thread list and chat header if this person is visible
      renderThreadList();
      updateChatHeaderPhoto(uid);
    }, () => {});
    profileUnsubs[uid] = unsub;
  }

  function updateChatHeaderPhoto(uid) {
    if (!activeThread) return;
    const other = otherPerson(activeThread);
    if (other.uid !== uid) return;
    const avatarEl = document.querySelector('.ch-avatar');
    if (avatarEl) avatarEl.innerHTML = avatarHtml(bestPhoto(uid, other.photo), bestName(uid, other.name), 38);
  }

  // Get the "other" person in a thread
  function otherPerson(t) {
    if (me.uid === t.buyerId) return { name: t.sellerName, photo: t.sellerPhoto, uid: t.sellerId };
    return { name: t.buyerName,  photo: t.buyerPhoto,  uid: t.buyerId  };
  }

  // ── AUTH ──
  onAuthStateChanged(auth, user => {
    if (!user) { window.location.href = 'login.html'; return; }
    me = user;
    document.body.classList.add('ready');

    // open thread from URL param e.g. messages.html?t=threadId
    const params    = new URLSearchParams(location.search);
    const pendingId = params.get('t');

    subscribeThreads(pendingId);
  });

  // ── SUBSCRIBE TO THREADS ──
  function subscribeThreads(autoOpenId) {
    if (threadsUnsub) threadsUnsub();
    let autoOpened = false;

    function handleSnap(snap) {
      allThreads = snap.docs
        .map(d => ({ id: d.id, ...d.data() }))
        .sort((a, b) => {
          const ta = a.lastAt?.toMillis?.() ?? a.lastAt?.seconds ?? 0;
          const tb = b.lastAt?.toMillis?.() ?? b.lastAt?.seconds ?? 0;
          return tb - ta;
        });
      // subscribe to profile of every participant so photos stay fresh
      allThreads.forEach(t => {
        const other = otherPerson(t);
        subscribeProfile(other.uid,
          me.uid === t.buyerId ? t.sellerName : t.buyerName,
          me.uid === t.buyerId ? t.sellerPhoto : t.buyerPhoto
        );
        // also subscribe own profile for name updates
        subscribeProfile(me.uid, me.displayName, me.photoURL);
      });
      applySearch();
      if (autoOpenId && !autoOpened) {
        const found = allThreads.find(x => x.id === autoOpenId);
        if (found) { autoOpened = true; openThread(found); }
      }
    }

    function handleError(err) {
      console.error('Conversations query failed:', err.code, err.message);
      // Firestore index not created yet — fall back to simple query, sort client-side
      const simpleQ = query(
        collection(db, 'conversations'),
        where('participants', 'array-contains', me.uid)
      );
      threadsUnsub = onSnapshot(simpleQ, handleSnap, err2 => {
        console.error('Simple query also failed:', err2);
        document.getElementById('threadList').innerHTML =
          `<div class="sidebar-empty"><div class="se-icon">⚠️</div>
           <p>Could not load messages.<br/><small style="opacity:.6">${err2.message}</small></p></div>`;
      });
    }

    // Primary query — needs Firestore composite index (participants ASC + lastAt DESC)
    const q = query(
      collection(db, 'conversations'),
      where('participants', 'array-contains', me.uid),
      orderBy('lastAt', 'desc')
    );
    threadsUnsub = onSnapshot(q, handleSnap, handleError);
  }

  // ── SEARCH ──
  document.getElementById('threadSearch').addEventListener('input', e => {
    searchVal = e.target.value.toLowerCase().trim();
    applySearch();
  });

  function applySearch() {
    if (!searchVal) {
      filteredThreads = [...allThreads];
    } else {
      filteredThreads = allThreads.filter(t => {
        const other = otherPerson(t);
        return other.name?.toLowerCase().includes(searchVal) ||
               t.listingName?.toLowerCase().includes(searchVal);
      });
    }
    renderThreadList();
  }

  // ── RENDER THREAD LIST ──
  function renderThreadList() {
    const el = document.getElementById('threadList');

    if (!filteredThreads.length) {
      el.innerHTML = `
        <div class="sidebar-empty">
          <div class="se-icon">💬</div>
          <p>${searchVal ? 'No conversations match your search.' : 'No messages yet.<br/>Message a seller from any listing!'}</p>
        </div>`;
      return;
    }

    el.innerHTML = filteredThreads.map(t => {
      const other   = otherPerson(t);
      const unread  = t.unreadCount?.[me.uid] || 0;
      const isActive= activeThread?.id === t.id;
      const isMine  = t.lastSenderId === me.uid;
      const preview = t.lastMessage ? (isMine ? 'You: ' : '') + t.lastMessage : 'No messages yet';

      return `
        <div class="thread-item${isActive ? ' active' : ''}${unread ? ' unread' : ''}"
             data-id="${t.id}" onclick="selectThread('${t.id}')">
          <div class="thread-avatar">${avatarHtml(bestPhoto(other.uid, other.photo), bestName(other.uid, other.name))}</div>
          <div class="thread-body">
            <div class="thread-top">
              <div class="thread-name">${esc(bestName(other.uid, other.name))}</div>
              <div class="thread-time">${timeAgo(t.lastAt)}</div>
            </div>
            <div class="thread-bottom">
              <div class="thread-preview">${esc(preview)}</div>
              ${unread ? `<div class="unread-pill">${unread > 99 ? '99+' : unread}</div>` : ''}
            </div>
            ${t.listingName ? `<div class="thread-ref">📦 ${esc(t.listingName)}</div>` : ''}
          </div>
        </div>`;
    }).join('');
  }

  // ── SELECT THREAD ──
  window.selectThread = id => {
    const t = allThreads.find(x => x.id === id);
    if (t) openThread(t);
  };

  async function openThread(t) {
    activeThread = t;
    renderThreadList();

    // mobile: show chat area
    document.getElementById('chatArea').classList.add('mobile-open');

    // mark as read
    const unread = t.unreadCount?.[me.uid] || 0;
    if (unread > 0) {
      await setDoc(doc(db, 'conversations', t.id),
        { [`unreadCount.${me.uid}`]: 0 }, { merge: true });
    }

    // use cached profile photo (already kept fresh by subscribeProfile)
    const other = otherPerson(t);
    // ensure we're subscribed to their profile
    subscribeProfile(other.uid,
      me.uid === t.buyerId ? t.sellerName : t.buyerName,
      me.uid === t.buyerId ? t.sellerPhoto : t.buyerPhoto
    );
    const otherPhoto = bestPhoto(other.uid, other.photo);
    const otherName  = bestName(other.uid, other.name);

    // build chat UI
    const area = document.getElementById('chatArea');
    area.innerHTML = `
      <div class="chat-header">
        <button class="ch-back" onclick="closeMobileChat()">‹</button>
        <div class="ch-avatar">${avatarHtml(otherPhoto, otherName, 38)}</div>
        <div class="ch-info">
          <div class="ch-name">${esc(otherName)}</div>
          <div class="ch-sub">${t.listingName ? `📦 ${esc(t.listingName)} · ₱${Number(t.listingPrice||0).toLocaleString()}` : ''}</div>
        </div>
        ${t.listingId ? `<a class="ch-listing-btn" href="index.html">View Listing ↗</a>` : ''}
      </div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-area">
        <div class="chat-input-wrap">
          <textarea class="chat-input" id="chatInput" placeholder="Type a message…" rows="1"></textarea>
          <button class="chat-send" id="chatSend" disabled>➤</button>
        </div>
      </div>`;

    // input events
    const ta   = document.getElementById('chatInput');
    const send = document.getElementById('chatSend');

    ta.addEventListener('input', () => {
      ta.style.height = 'auto';
      ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
      send.disabled = !ta.value.trim();
    });
    ta.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); }
    });
    send.addEventListener('click', doSend);
    ta.focus();

    // subscribe to messages
    if (chatUnsub) chatUnsub();
    const mq = query(
      collection(db, 'conversations', t.id, 'messages'),
      orderBy('createdAt', 'asc')
    );
    chatUnsub = onSnapshot(mq,
      snap => {
        const msgs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        renderMessages(msgs, t, otherPhoto);
      },
      err => {
        console.error('Messages query error:', err.code, err.message);
        // Fallback: fetch without orderBy, sort client-side
        const mqSimple = collection(db, 'conversations', t.id, 'messages');
        chatUnsub = onSnapshot(mqSimple, snap2 => {
          const msgs = snap2.docs
            .map(d => ({ id: d.id, ...d.data() }))
            .sort((a, b) => {
              const ta = a.createdAt?.toMillis?.() ?? a.createdAt?.seconds ?? 0;
              const tb = b.createdAt?.toMillis?.() ?? b.createdAt?.seconds ?? 0;
              return ta - tb;
            });
          renderMessages(msgs, t, otherPhoto);
        });
      }
    );
  }

  window.closeMobileChat = () => {
    document.getElementById('chatArea').classList.remove('mobile-open');
    activeThread = null;
    if (chatUnsub) { chatUnsub(); chatUnsub = null; }
    renderThreadList();
  };

  // ── RENDER MESSAGES ──
  function renderMessages(msgs, t, otherPhoto) {
    const el = document.getElementById('chatMessages');
    if (!el) return;

    if (!msgs.length) {
      el.innerHTML = `<div style="text-align:center;color:var(--muted);font-size:13px;padding:30px 20px;opacity:.6">
        No messages yet — say hello! 👋</div>`;
      return;
    }

    // Group consecutive messages from same sender, insert date dividers
    let html    = '';
    let prevDate = '';
    let prevSender = '';
    let groupMsgs  = [];

    const flushGroup = () => {
      if (!groupMsgs.length) return;
      const first    = groupMsgs[0];
      const mine     = first.senderId === me.uid;
      const other    = otherPerson(t);
      const showAvatar = !mine;

      html += `<div class="msg-group ${mine ? 'mine' : 'theirs'}">`;
      groupMsgs.forEach((m, i) => {
        const isLast = i === groupMsgs.length - 1;
        html += `<div class="msg-row">`;
        if (showAvatar) {
          if (isLast) {
            html += `<div class="msg-avatar-sm">${avatarHtml(otherPhoto, other.name, 26)}</div>`;
          } else {
            html += `<div class="msg-avatar-placeholder"></div>`;
          }
        }
        html += `<div class="bubble">${esc(m.text)}</div></div>`;
      });
      // timestamp on last bubble
      const last = groupMsgs[groupMsgs.length - 1];
      html += `<div class="bubble-time">${fmtTime(last.createdAt)}</div>`;
      html += `</div>`;
      groupMsgs = [];
    };

    msgs.forEach(m => {
      const msgDate = m.createdAt ? fmtDate(m.createdAt) : '';
      if (msgDate && msgDate !== prevDate) {
        flushGroup();
        html += `<div class="date-divider">${msgDate}</div>`;
        prevDate   = msgDate;
        prevSender = '';
      }
      if (m.senderId !== prevSender) {
        flushGroup();
        prevSender = m.senderId;
      }
      groupMsgs.push(m);
    });
    flushGroup();

    el.innerHTML = html;
    // smooth scroll to bottom
    el.scrollTop = el.scrollHeight;
  }

  // ── SEND MESSAGE ──
  async function doSend() {
    const ta   = document.getElementById('chatInput');
    const send = document.getElementById('chatSend');
    if (!ta || !activeThread) return;
    const text = ta.value.trim();
    if (!text) return;

    ta.value = ''; ta.style.height = 'auto'; send.disabled = true;

    const t       = activeThread;
    const other   = otherPerson(t);
    const otherId = other.uid;

    try {
      await Promise.all([
        addDoc(collection(db, 'conversations', t.id, 'messages'), {
          senderId:   me.uid,
          senderName: me.displayName || 'Unknown',
          text,
          createdAt:  serverTimestamp()
        }),
        setDoc(doc(db, 'conversations', t.id), {
          lastMessage:  text,
          lastSenderId: me.uid,
          lastAt:       serverTimestamp(),
          [`unreadCount.${otherId}`]: (t.unreadCount?.[otherId] || 0) + 1
        }, { merge: true })
      ]);
      // update local thread so unread count increments correctly on next send
      const idx = allThreads.findIndex(x => x.id === t.id);
      if (idx !== -1) {
        allThreads[idx] = {
          ...allThreads[idx],
          lastMessage: text,
          lastSenderId: me.uid,
          [`unreadCount.${otherId}`]: (allThreads[idx].unreadCount?.[otherId] || 0) + 1
        };
        activeThread = allThreads[idx];
      }
    } catch (err) {
      console.error(err);
      ta.value = text; // restore on failure
    }
  }

</script>
</body>
